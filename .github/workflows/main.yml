name: KodeDice Proposal Builder - Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            echo "🚀 Connected to KodeDice Proposal Builder Server"

            cd /home/projects/kodedice-proposal-builder

            BRANCH=${{ github.ref_name }}
            echo "📌 Deploying branch: $BRANCH"

            # Clean sync
            git fetch origin
            git checkout $BRANCH
            git reset --hard origin/$BRANCH

            echo "🐳 Building & starting KodeDice Proposal Builder"
            docker compose up -d --build

            echo "✅ KodeDice Proposal Builder deployment completed"
